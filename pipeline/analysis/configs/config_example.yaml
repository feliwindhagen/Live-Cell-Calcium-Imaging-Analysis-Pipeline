# Example configuration for the Ca-trigger analysis (CellProfiler → Python)
#
# SECTIONS TO EDIT:
#   - mode, title, ylim          (what kind of analysis and how to label/scale the plot)
#   - base_dir + cell_lines      (paths to your CellProfiler output folders)
#   - files > roi_csv            (which ROI type to use: CellDisk, CytoRing, or CellOutline)
#   - analysis settings          (frame interval, baseline frames, track_rule)
#
# SECTIONS TO LEAVE UNCHANGED (unless your CellProfiler pipeline uses different names):
#   - files > nuclei_csv / pos_mt_csv / pos_other_csv
#   - columns                    (must match CellProfiler output column names)
#   - exports                    (controls optional intermediate file exports)

mode: cross_cell_lines
title: "Ca-trigger comparison"
ylim: [0.9, 2.5]

# -------------------------
# Files inside each CellProfiler output folder
# -------------------------
files:
  nuclei_csv: "MyExpt_Nuclei.csv"

  # IMPORTANT: choose ROI CSV depending on your pipeline and what you want to quantify:
  # NPC options:
  #   - "MyExpt_CytoRing.csv"  (CytoRing)
  #   - "MyExpt_CellDisk.csv"  (CellDisk)
  # Fib options:
  #   - "MyExpt_CellOutline.csv" (CellOutline)
  roi_csv: "MyExpt_CytoRing.csv"

  pos_mt_csv: "MyExpt_PositiveCells_mt.csv"
  pos_other_csv: "MyExpt_PositiveCells_other.csv"
  image_csv: "MyExpt_Image.csv"   # optional; not required by the current refactor

# -------------------------
# Column names (defaults match your pipelines)
# -------------------------
columns:
  image_number: "ImageNumber"
  object_number: "ObjectNumber"
  track_id_col_prefix: "TrackObjects_Label"
  parent_nuclei: "Parent_Nuclei"
  mt_mean: "Intensity_MeanIntensity_BGS_mt"
  other_mean: "Intensity_MeanIntensity_BGS_other"

# -------------------------
# Analysis settings
# -------------------------
analysis:
  frame_interval_s: 5.0
  baseline_frames: 5

  # How to select tracks based on positivity flags:
  # - both_channels_any_time: keep TrackIDs that are positive in BOTH channels at any time point
  # - either_channel_any_time: keep TrackIDs that are positive in EITHER channel at any time point
  track_rule: both_channels_any_time

  # How to link ROI rows to nuclei TrackIDs:
  # - auto: use Parent_Nuclei if present (Fib), else use ObjectNumber (NPC)
  # - by_objectnumber: merge on (ImageNumber,ObjectNumber)
  # - by_parent_nuclei: merge ROI.Parent_Nuclei to nuclei.ObjectNumber
  roi_link_strategy: auto

  # Optional photobleach correction in F/F0 space (applied after FF0 normalisation)
  photobleach:
    enabled: false
    model: exp_offset   # exp_offset or linear
    mt_params: null     # if you already have fitted params, put them here
    other_params: null

# -------------------------
# Export settings
# -------------------------
exports:
  export_plot_inputs: true
  export_into_experiment_folder: true
  export_dirname: "_exports_plot_inputs"
  export_root: null

  export_cell_line_tables: false
  export_cell_line_dir: null

# -------------------------
# Cross-cell-line mode example
# -------------------------
base_dir: "~/Experiments/cellprofiler_outputs"

cell_lines:
  NCRM1:
    - "{base_dir}/20250819_mt_er_CaTrigger_NCRM1"
    - "{base_dir}/20250820_mt_er_CaTrigger_NCRM1"
  NCRM2:
    - "{base_dir}/20251001_mt_er_CaTrigger_NCRM2"
# ... add more cell lines and replicates as needed

# -------------------------
# Photobleach-fit mode example
# Set mode: photobleach_fit and define:
# -------------------------
# photobleach_model: exp_offset
# photobleach_runs:
